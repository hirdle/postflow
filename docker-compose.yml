services:
  backend:
    build:
      context: ./backend
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${POSTFLOW_BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
    working_dir: /app
    command: npm run dev
    ports:
      - "${POSTFLOW_FRONTEND_PORT:-3000}:3000"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
